name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # to create GitHub Releases and upload assets

jobs:
  release-android:
    name: Release APK + AAB (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB (Play Store bundle)
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

  release-ios:
    name: Release iOS (no-codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: pod install
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS release (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Zip Runner.app
        run: |
          cd build/ios/iphoneos
          zip -ry Runner.app.zip Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app.zip
          if-no-files-found: error
          retention-days: 90

  publish-github-release:
    name: Publish GitHub Release
    needs: [release-android, release-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts/android

      - uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: artifacts/ios

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/android/**/*.apk
            artifacts/android/**/*.aab
            artifacts/ios/Runner.app.zip
