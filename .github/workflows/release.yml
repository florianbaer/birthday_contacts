name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # to create GitHub Releases and upload assets

jobs:
  release-android:
    name: Release APK + AAB (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      # Sign every release with the same stable keystore so users can install a
      # new APK over an older one. Without this the build falls back to an
      # ephemeral debug key and updates fail with INSTALL_FAILED_UPDATE_INCOMPATIBLE.
      - name: Configure release signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB (Play Store bundle)
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

  release-ios:
    name: Release iOS (no-codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: flutter precache --ios
        run: flutter precache --ios

      - name: pod install
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS release (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Zip Runner.app
        run: |
          cd build/ios/iphoneos
          zip -ry Runner.app.zip Runner.app

      - uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app.zip
          if-no-files-found: error
          retention-days: 90

  publish-github-release:
    name: Publish GitHub Release
    needs: [release-android, release-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: android-release
          path: artifacts/android

      - uses: actions/download-artifact@v8
        with:
          name: ios-release
          path: artifacts/ios

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/android/**/*.apk
            artifacts/android/**/*.aab
            artifacts/ios/Runner.app.zip
