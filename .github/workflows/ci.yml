name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: Version part to bump for this release
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # to push the version-bump commit + tag and call release.yml

jobs:
  analyze-and-test:
    name: Analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: dart format check
        run: dart format --output=none --set-exit-if-changed .

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

  build-android:
    name: Build debug APK (Android)
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Build debug APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  build-ios:
    name: Build iOS (no-codesign)
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: flutter precache --ios
        run: flutter precache --ios

      - name: pod install
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign

      - uses: actions/upload-artifact@v7
        with:
          name: app-ios-debug
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error
          retention-days: 14

  tag-release:
    name: Release current version + open next
    needs: analyze-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Model: pubspec.yaml always holds the *next version to release*.
      #   - push to main  -> release that version as-is (a patch release),
      #   - manual run     -> jump to the next minor/major first, then release.
      # After tagging we advance pubspec to the next patch placeholder. The build
      # number (Android versionCode) only ever increases so installs-over-update
      # never break. The APK/AAB versionName+versionCode come straight from this
      # version via flutter.versionName/versionCode (android/app/build.gradle.kts).
      - name: Compute release + next version
        id: version
        env:
          # 'patch' on push to main; chosen level on manual dispatch.
          LEVEL: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          current=$(grep -E '^version:' pubspec.yaml | sed -E 's/version:[[:space:]]*//')
          semver=${current%%+*}
          build=${current##*+}
          IFS=. read -r major minor patch <<< "$semver"
          case "$LEVEL" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) ;;  # release the queued version as-is
            *) echo "Unknown bump level: $LEVEL" >&2; exit 1 ;;
          esac
          release="${major}.${minor}.${patch}+${build}"
          tag="v${major}.${minor}.${patch}"
          # Next placeholder: bump patch, climb the build number.
          next="${major}.${minor}.$((patch + 1))+$((build + 1))"
          echo "Releasing ${release} (tag ${tag}); next will be ${next}"
          {
            echo "release=${release}"
            echo "version=${release}"
            echo "tag=${tag}"
            echo "next=${next}"
          } >> "$GITHUB_OUTPUT"

      - name: Tag release and prepare next iteration
        env:
          RELEASE: ${{ steps.version.outputs.release }}
          NEXT: ${{ steps.version.outputs.next }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Pin pubspec to the release version and tag that commit so the built
          # artifacts carry the released version. (No-op commit when LEVEL=patch
          # since pubspec already holds the release version.)
          sed -i -E "s/^version:.*/version: ${RELEASE}/" pubspec.yaml
          git add pubspec.yaml
          git diff --cached --quiet || git commit -m "chore: release ${TAG}"
          git tag "${TAG}"

          # Advance pubspec to the next development version.
          sed -i -E "s/^version:.*/version: ${NEXT}/" pubspec.yaml
          git add pubspec.yaml
          git commit -m "chore: prepare next version ${NEXT} [skip ci]"

          # Pushes made with GITHUB_TOKEN do not start new workflow runs, so this
          # neither re-triggers CI nor (on its own) the release workflow.
          git push origin HEAD:main
          git push origin "${TAG}"

  release:
    name: Build + publish release
    needs: tag-release
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag-release.outputs.tag }}
    secrets: inherit
