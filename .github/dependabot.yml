version: 2
updates:
  # Flutter / Dart packages (pubspec.yaml)
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dart-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Android Gradle dependencies (android/app/build.gradle.kts)
  - package-ecosystem: "gradle"
    directory: "/android/app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      gradle-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows (.github/workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-all:
        patterns:
          - "*"
